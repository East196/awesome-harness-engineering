<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="planner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="generator" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="evaluator" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#1e293b">
    Anthropic 多智能体 Harness 架构
  </text>
  
  <!-- Planner Node -->
  <g transform="translate(150, 200)">
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="url(#planner)" stroke="#1e40af" stroke-width="2"/>
    <text y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Planner</text>
    <text y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.9">规划器</text>
    <!-- Checklist icon -->
    <g transform="translate(-15, -35)" fill="white">
      <rect x="0" y="0" width="8" height="8" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
      <rect x="0" y="12" width="8" height="8" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
      <rect x="0" y="24" width="8" height="8" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
      <path d="M2 4 L4 6 L6 2" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
  </g>
  
  <!-- Generator Node -->
  <g transform="translate(400, 200)">
    <circle r="60" fill="url(#generator)" stroke="#047857" stroke-width="2"/>
    <text y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Generator</text>
    <text y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.9">生成器</text>
    <!-- Code brackets -->
    <text y="-35" text-anchor="middle" font-family="monospace" font-size="20" fill="white">&lt;/&gt;</text>
  </g>
  
  <!-- Evaluator Node -->
  <g transform="translate(650, 200)">
    <polygon points="0,-55 55,0 0,55 -55,0" fill="url(#evaluator)" stroke="#b45309" stroke-width="2"/>
    <text y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Evaluator</text>
    <text y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.9">评估器</text>
    <!-- Magnifying glass -->
    <g transform="translate(-10, -35)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="white" stroke-width="2"/>
      <line x1="5" y1="5" x2="12" y2="12" stroke="white" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Arrows -->
  <!-- Planner to Generator -->
  <path d="M 210 200 Q 280 160 340 200" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="275" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">产品规格</text>
  
  <!-- Generator to Evaluator -->
  <path d="M 460 200 Q 530 160 595 200" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="525" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">实现代码</text>
  
  <!-- Evaluator to Generator (Feedback loop) -->
  <path d="M 650 145 Q 650 80 400 80 Q 150 80 150 140" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="400" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444">评估反馈</text>
  
  <!-- Evaluator to Planner -->
  <path d="M 595 230 Q 530 270 460 230" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="525" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">质量报告</text>
  
  <!-- Legend -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="700" height="45" fill="white" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="10" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#475569">流程说明：</text>
    <text x="10" y="35" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Planner 将需求扩展为规格 → Generator 逐个功能实现 → Evaluator 实际测试并评分 → 反馈循环驱动迭代优化</text>
  </g>
</svg>