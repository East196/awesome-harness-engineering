# Minimal Harness 配置文件
# 复制此文件为 config.local.yaml 并填入你的 API 密钥

# 模型配置
models:
  planner:
    provider: anthropic
    model: claude-3-opus-20240229
    temperature: 0.7
    max_tokens: 4000
    
  generator:
    provider: anthropic
    model: claude-3-sonnet-20240229
    temperature: 0.5
    max_tokens: 4000
    
  evaluator:
    provider: anthropic
    model: claude-3-haiku-20240307
    temperature: 0.3
    max_tokens: 2000

# 迭代配置
iteration:
  max_iterations: 5
  min_quality_score: 0.8
  early_stop: true  # 达到质量标准时提前停止

# 上下文管理
context:
  max_tokens: 4000
  reset_threshold: 0.8  # 上下文使用率超过此值时重置
  compaction_enabled: true
  
# 评估标准
evaluation:
  criteria:
    functionality:
      weight: 0.3
      description: "功能完整性"
    code_quality:
      weight: 0.25
      description: "代码质量"
    maintainability:
      weight: 0.2
      description: "可维护性"
    performance:
      weight: 0.15
      description: "性能"
    security:
      weight: 0.1
      description: "安全性"

# 日志配置
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "harness.log"

# 输出配置
output:
  directory: "./output"
  save_intermediate: true  # 保存中间结果
  format: "json"  # json, yaml
